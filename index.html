<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Expansivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div>
            <img src="./logo.jpg" alt="Logo Empresa Engenharia">
        </div>
        <nav>
            <button>

            </button>
            <ul class="">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./sobre.html">Sobre Nós</a></li>
                <li><a href="./servico.html">Serviço</a></li>
                <li><a href="./cliente.html">Clientes</a></li>
                <li><a href="./contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <form action="formContato">
                <div class="headerForm">
                    <h2>Receba Nossas Notificações</h2>
                </div>
                <div class="rowInput">
                    <label for="CPF">CPF</label>
                    <input type="text" inputmode="numeric" placeholder="000.000.000-00" id="cpf" required>
                    <p class="messageError CPF"></p>
                </div>
                <div class="rowInput">
                    <label for="email">EMAIL</label>
                    <input type="email" placeholder="email@gmail.com" id="email" required>
                    <p class="messageError email"></p>
                </div>
                <div class="rowInput">
                    <label for="tel">TELEFONE</label>
                    <input type="tel" placeholder="99999-9999" id="tel" required>
                    <p class="messageError tel"></p>
                </div>
                <div class="rowInput">
                    <button id="limpaForm">Limpar</button>
                    <button id="enviarForm">Enviar</button>
                </div>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
